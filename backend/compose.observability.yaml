services:
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: postgres:5432/assistant_dev?sslmode=disable
      DATA_SOURCE_USER: postgres_exporter
      DATA_SOURCE_PASS: ${POSTGRES_EXPORTER_PASSWORD:?Set POSTGRES_EXPORTER_PASSWORD in backend/.env or the shell environment}
    command:
      - --config.file=/etc/postgres-exporter/postgres_exporter.yml
    volumes:
      - ./infra/observability/postgres-exporter/postgres_exporter.yml:/etc/postgres-exporter/postgres_exporter.yml:ro

  prometheus:
    image: prom/prometheus:v3.13.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:13.1.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  prometheus_data:
